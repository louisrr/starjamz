server:
  port: 8080

spring:
  application:
    name: notification-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/fetio}
    username: ${POSTGRES_USER:fetio}
    password: ${POSTGRES_PASSWORD:fetio}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

aerospike:
  host: ${AEROSPIKE_HOST:localhost}
  port: ${AEROSPIKE_PORT:3000}
  namespace: fetio

# FCM / Firebase credentials file path
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:/secrets/firebase-adminsdk.json}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Deduplication window: suppress duplicate notifications within this window
notification:
  dedup-window-seconds: 3600
