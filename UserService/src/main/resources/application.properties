# Stripe API Key
stripe.api.key=sk_test_yourStripeApiKey

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379

# Email (SendGrid) Configuration
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=SG.yourSendGridApiKey

# Aerospike - system of engagement
aerospike.host=localhost
aerospike.port=3000

# ClickHouse - system of record
clickhouse.url=jdbc:clickhouse://localhost:8123/starjamz

# Prevent Spring Boot from auto-configuring JPA against the ClickHouse DataSource
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# AWS SES - email confirmation
aws.region=${AWS_REGION:us-east-1}
aws.ses.from-email=${AWS_SES_FROM_EMAIL:noreply@starjamz.com}

# Twilio - SMS confirmation
twilio.account-sid=${TWILIO_ACCOUNT_SID:ACplaceholder}
twilio.auth-token=${TWILIO_AUTH_TOKEN:placeholder}
twilio.from-number=${TWILIO_FROM_NUMBER:+15550000000}
